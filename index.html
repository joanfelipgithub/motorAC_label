<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MotorScan — 3Φ Calculator</title>
<script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');

  :root {
    --bg: #0e0f11;
    --panel: #16181c;
    --border: #2a2d35;
    --accent: #f0a500;
    --accent2: #e05c00;
    --green: #39d98a;
    --red: #ff4d4d;
    --text: #d8dce8;
    --dim: #6b7080;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1c22 0%, transparent 100%);
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #000; font-weight: 800;
    flex-shrink: 0;
  }

  .logo-text .main { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #fff; }
  .logo-text .sub { font-size: 11px; font-weight: 300; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }

  main { position: relative; z-index: 1; padding: 20px 16px; max-width: 640px; margin: 0 auto; }

  /* --- Camera & Scan Window --- */
  .cam-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    padding: 20px;
    margin-bottom: 20px;
  }

  #video-container {
    position: relative;
    background: #000;
    aspect-ratio: 4/3;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
  }

  #video { width: 100%; height: 100%; object-fit: cover; }

  .scan-overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 40px 20px;
  }

  .scan-window {
    position: absolute;
    top: 40px; bottom: 40px; left: 20px; right: 20px;
    border: 1px dashed rgba(240, 165, 0, 0.3);
    pointer-events: none;
  }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove { 0%,100%{top:0%} 50%{top:100%} }

  .corner { position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid; }
  .corner.tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
  .corner.tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }

  /* --- Buttons & UI --- */
  .btn {
    padding: 13px 18px; font-family: var(--sans); font-weight: 600; font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-analyze { background: var(--accent2); color: #fff; width: 100%; margin-top: 12px; }
  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

  /* --- Fields & Results --- */
  .values-card, .results-card {
    background: var(--panel); border: 1px solid var(--border);
    padding: 20px; margin-bottom: 20px; display: none;
  }
  .values-card { border-top: 3px solid var(--green); }
  .results-card { border-top: 3px solid var(--accent2); }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .field-group input { background: #0b0c0e; border: 1px solid var(--border); color: var(--text); padding: 10px; font-family: var(--mono); }

  .formula-block { background: #0b0c0e; border-left: 3px solid var(--accent); padding: 12px; margin-bottom: 10px; font-family: var(--mono); font-size: 13px; }
  .formula-title { font-size: 10px; color: var(--accent); font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
  .val { color: var(--accent2); }
  .result-val { color: var(--green); font-weight: 800; }

  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .result-cell { background: #0b0c0e; border: 1px solid var(--border); padding: 12px; text-align: center; }
  .r-label { font-size: 9px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }
  .r-value { font-family: var(--mono); font-size: 20px; color: var(--green); }

  #status-bar { font-family: var(--mono); font-size: 12px; background: #000; padding: 10px; display: none; gap: 10px; align-items: center; border: 1px solid var(--border); margin-bottom: 15px; }
  #status-bar.active { display: flex; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  canvas, #file-input { display: none; }
  #preview-img { width: 100%; margin-top: 12px; border: 1px solid var(--border); display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">3Φ</div>
  <div class="logo-text">
    <div class="main">MOTORSCAN</div>
    <div class="sub">Induction Analyzer</div>
  </div>
</header>

<main>
  <div class="cam-card">
    <div id="video-container">
      <video id="video" autoplay playsinline></video>
      <div class="scan-overlay"></div>
      <div class="scan-window">
        <div class="scan-line"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
    
    <canvas id="canvas"></canvas>
    <img id="preview-img" alt="Captured plate"/>

    <div class="btn-row" style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn btn-primary" style="flex:1" onclick="startCamera()">📷 Camera</button>
      <button class="btn btn-secondary" style="flex:1" onclick="document.getElementById('file-input').click()">📁 Upload</button>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)"/>
    </div>

    <div id="snap-row" style="display:none; gap:10px; margin-top:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="snapPhoto()">⚡ Capture</button>
      <button class="btn btn-secondary" style="flex:1" onclick="stopCamera()">✕ Cancel</button>
    </div>

    <button class="btn btn-analyze" id="analyze-btn" onclick="runOCR()" disabled>⟳ Analyze Label</button>
  </div>

  <div id="status-bar"><div class="spinner"></div><span id="status-text">Processing...</span></div>

  <div class="values-card" id="values-card">
    <div class="fields-grid">
      <div class="field-group"><label>Power P₂ (kW)</label><input type="number" id="f-p2" step="0.1"></div>
      <div class="field-group"><label>Voltage (V)</label><input type="number" id="f-v"></div>
      <div class="field-group"><label>Current (A)</label><input type="number" id="f-i" step="0.01"></div>
      <div class="field-group"><label>Speed (RPM)</label><input type="number" id="f-rpm"></div>
      <div class="field-group"><label>cos φ</label><input type="number" id="f-cosphi" step="0.01" max="1"></div>
      <div class="field-group"><label>Efficiency (%)</label><input type="number" id="f-eta" step="0.1"></div>
      
      <div class="field-group" style="grid-column: span 2; margin-top: 10px;">
        <label>Grid Frequency</label>
        <div style="display: flex; gap: 20px; margin-top: 5px;">
          <label style="cursor:pointer"><input type="radio" name="freq" value="50" checked> 50 Hz</label>
          <label style="cursor:pointer"><input type="radio" name="freq" value="60"> 60 Hz</label>
        </div>
      </div>
    </div>
    <button class="btn btn-analyze" onclick="calculate()">▶ Calculate</button>
  </div>

  <div class="results-card" id="results-card">
    <div id="formula-container"></div>
    <div class="result-grid" id="result-grid"></div>
  </div>
</main>

<script>
let stream = null;
let capturedDataUrl = null;

// --- Camera Logic ---
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 } });
    document.getElementById('video').srcObject = stream;
    document.getElementById('video-container').style.display = 'block';
    document.getElementById('snap-row').style.display = 'flex';
    document.getElementById('preview-img').style.display = 'none';
  } catch(e) { setStatus('Camera access denied.', false, true, true); }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('snap-row').style.display = 'none';
}

function snapPhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  // High-Contrast Pre-processing
  ctx.filter = 'grayscale(1) contrast(1.5) brightness(1.1)';
  ctx.drawImage(video, 0, 0);
  
  capturedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
  document.getElementById('preview-img').src = capturedDataUrl;
  document.getElementById('preview-img').style.display = 'block';
  stopCamera();
  document.getElementById('analyze-btn').disabled = false;
  setStatus('Ready for analysis.', false, true);
}

function handleFileUpload(e) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    capturedDataUrl = ev.target.result;
    document.getElementById('preview-img').src = capturedDataUrl;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('analyze-btn').disabled = false;
  };
  reader.readAsDataURL(e.target.files[0]);
}

// --- OCR Logic ---
async function runOCR() {
  if (!capturedDataUrl) return;
  setStatus('Initializing OCR...', true);
  try {
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text')
          setStatus('Recognizing... ' + Math.round(m.progress * 100) + '%', true);
      }
    });
    // DO NOT pass tessedit_pageseg_mode here — it causes the SetVariable crash
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.,/ +-:kKWVAHz()%'
    });
    const { data: { text } } = await worker.recognize(capturedDataUrl);
    await worker.terminate();
    parseAndFill(text);
    setStatus('Extraction complete — review values below.', false, true);
  } catch(err) {
    console.error('OCR Error:', err);
    setStatus('OCR failed: ' + err.message, false, true, true);
  }
}

// --- Fuzzy Parser ---
function parseAndFill(text) {
  const t = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').replace(/([0-9])\s*([kK][wW]|V|A|rpm|min|%)/g, '$1 $2');
  
  const findValue = (regexList) => {
    for (const regex of regexList) {
      const m = t.match(regex);
      if (m) return parseFloat(m[1].replace(',', '.'));
    }
    return null;
  };

  setVal('f-p2', findValue([/[Pp]2[\s\-:]*([0-9]+[.,][0-9]+)/, /([0-9]+[.,][0-9]+)\s*[kK][Ww]/]));
  setVal('f-v', findValue([/([0-9]{3,4})\s*[Vv][Δ∆dDYy]?/, /[Vv][Δ∆dDYy]?[\s\-:]*([0-9]{3,4})/]));
  setVal('f-i', findValue([/([0-9]+[.,][0-9]+)\s*[Aa][Δ∆dDYy]?/, /[Aa][Δ∆dDYy]?[\s\-:]*([0-9]+[.,][0-9]+)/]));
  setVal('f-rpm', findValue([/([0-9]{3,4})\s*(?:rpm|min)/i, /(?:rpm|min)[\s\-:]*([0-9]{3,4})/i]));
  
  let cp = findValue([/[cC]os\s*[φΦph]?[\s\-:]*([0\s]*[.,][0-9]{2,3})/]);
  if (!cp) { const m = t.match(/[.,]([0-9]{2})/); if(m) cp = parseFloat('0.'+m[1]); }
  setVal('f-cosphi', cp);
  
  setVal('f-eta', findValue([/[ηhHnN][\s\-:]*([0-9]{2,3}[.,][0-9])/, /([0-9]{2}[.,][0-9])\s*%/]));

  document.getElementById('values-card').style.display = 'block';
}

function setVal(id, v) { if(v) document.getElementById(id).value = v; }

// --- 3-Phase Calculations ---
function calculate() {
  const p2 = parseFloat(document.getElementById('f-p2').value);
  const v = parseFloat(document.getElementById('f-v').value);
  const i = parseFloat(document.getElementById('f-i').value);
  const rpm = parseFloat(document.getElementById('f-rpm').value);
  const cosphi = parseFloat(document.getElementById('f-cosphi').value);
  const freq = parseInt(document.querySelector('input[name="freq"]:checked').value);
  
  const container = document.getElementById('formula-container');
  const grid = document.getElementById('result-grid');
  container.innerHTML = ''; grid.innerHTML = '';

  let pelec = null, torque = null, slip = null, poles = null, ns = null;

  if (v && i && cosphi) {
    pelec = Math.sqrt(3) * v * i * cosphi / 1000;
    addFormula(container, 'Electrical Input', `√3 × ${v}V × ${i}A × ${cosphi} = <span class="result-val">${pelec.toFixed(2)} kW</span>`);
  }

  if (p2 && rpm) {
    torque = (p2 * 9550) / rpm;
    addFormula(container, 'Shaft Torque', `${p2}kW × 9550 / ${rpm}rpm = <span class="result-val">${torque.toFixed(1)} Nm</span>`);
    
    const syncs = (freq === 60) ? [3600, 1800, 1200, 900] : [3000, 1500, 1000, 750];
    ns = syncs.find(s => s > rpm) || syncs[0];
    poles = Math.round((120 * freq) / ns);
    slip = ((ns - rpm) / ns) * 100;
    addFormula(container, `Slip & Poles (${freq}Hz)`, `n_s: ${ns} | Poles: ${poles} | Slip: <span class="result-val">${slip.toFixed(2)}%</span>`);
  }

  const results = [
    { l: 'P_elec', v: pelec?.toFixed(2), u: 'kW' },
    { l: 'Torque', v: torque?.toFixed(1), u: 'Nm' },
    { l: 'Slip', v: slip?.toFixed(1), u: '%' },
    { l: 'Poles', v: poles, u: 'P' }
  ];

  results.forEach(r => {
    grid.innerHTML += `<div class="result-cell"><div class="r-label">${r.l}</div><div class="r-value">${r.v || '--'}</div><div class="r-unit">${r.u}</div></div>`;
  });

  document.getElementById('results-card').style.display = 'block';
  document.getElementById('results-card').scrollIntoView({ behavior: 'smooth' });
}

function addFormula(parent, title, eq) {
  parent.innerHTML += `<div class="formula-block"><div class="formula-title">${title}</div><div class="eq">${eq}</div></div>`;
}

function setStatus(msg, loading, show, error) {
  const bar = document.getElementById('status-bar');
  bar.classList.toggle('active', show);
  document.getElementById('status-text').textContent = msg;
  bar.querySelector('.spinner').style.display = loading ? 'block' : 'none';
  if(error) document.getElementById('status-text').style.color = 'var(--red)';
}
</script>
</body>
</html>
