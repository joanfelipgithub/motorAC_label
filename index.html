<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MotorScan — 3Φ Calculator</title>
<script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');
  :root{--bg:#0e0f11;--panel:#16181c;--border:#2a2d35;--accent:#f0a500;--accent2:#e05c00;--green:#39d98a;--red:#ff4d4d;--text:#d8dce8;--dim:#6b7080;--mono:'Share Tech Mono',monospace;--sans:'Barlow Condensed',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.02) 39px,rgba(255,255,255,.02) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.02) 39px,rgba(255,255,255,.02) 40px);pointer-events:none;z-index:0;}
  header{position:relative;z-index:1;display:flex;align-items:center;gap:14px;padding:18px 20px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1a1c22 0%,transparent 100%);}
  .logo-icon{width:42px;height:42px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:20px;color:#000;font-weight:800;flex-shrink:0;}
  .logo-text .main{font-size:26px;font-weight:800;letter-spacing:2px;color:#fff;}
  .logo-text .sub{font-size:11px;font-weight:300;letter-spacing:4px;color:var(--accent);text-transform:uppercase;}
  main{position:relative;z-index:1;padding:20px 16px;max-width:640px;margin:0 auto;}
  .cam-card{background:var(--panel);border:1px solid var(--border);border-top:3px solid var(--accent);padding:20px;margin-bottom:20px;}
  #video-container{position:relative;background:#000;aspect-ratio:4/3;overflow:hidden;border:1px solid var(--border);display:none;}
  #video{width:100%;height:100%;object-fit:cover;}
  .scan-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:40px 20px;}
  .scan-window{position:absolute;top:40px;bottom:40px;left:20px;right:20px;border:1px dashed rgba(240,165,0,.3);pointer-events:none;}
  .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite;}
  @keyframes scanMove{0%,100%{top:0%}50%{top:100%}}
  .corner{position:absolute;width:24px;height:24px;border-color:var(--accent);border-style:solid;}
  .corner.tl{top:-2px;left:-2px;border-width:4px 0 0 4px;}.corner.tr{top:-2px;right:-2px;border-width:4px 4px 0 0;}
  .corner.bl{bottom:-2px;left:-2px;border-width:0 0 4px 4px;}.corner.br{bottom:-2px;right:-2px;border-width:0 4px 4px 0;}
  .btn{padding:13px 18px;font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;}
  .btn-primary{background:var(--accent);color:#000;}.btn-primary:hover{background:#ffc200;}
  .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .btn-analyze{background:var(--accent2);color:#fff;width:100%;margin-top:12px;font-size:15px;}.btn-analyze:hover{background:#ff7a1a;}.btn-analyze:disabled{opacity:.5;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;margin-top:14px;}
  canvas,#file-input{display:none;}
  #preview-img{width:100%;margin-top:12px;border:1px solid var(--border);display:none;}
  #status-bar{font-family:var(--mono);font-size:12px;background:#000;padding:10px;display:none;gap:10px;align-items:center;border:1px solid var(--border);margin-bottom:15px;}
  #status-bar.active{display:flex;}
  .spinner{width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-label{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}
  .values-card,.results-card{background:var(--panel);border:1px solid var(--border);padding:20px;margin-bottom:20px;display:none;}
  .values-card{border-top:3px solid var(--green);}.results-card{border-top:3px solid var(--accent2);}
  .fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .field-group{display:flex;flex-direction:column;gap:4px;}
  .field-group label{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  .field-group input{background:#0b0c0e;border:1px solid var(--border);color:var(--text);padding:10px;font-family:var(--mono);font-size:15px;width:100%;transition:border-color .2s;}
  .field-group input:focus{outline:none;border-color:var(--green);}
  .radio-row{display:flex;gap:20px;margin-top:6px;font-size:13px;font-family:var(--mono);}
  .radio-row label{cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px;}
  .formula-block{background:#0b0c0e;border-left:3px solid var(--accent);padding:12px;margin-bottom:10px;font-family:var(--mono);font-size:13px;}
  .formula-title{font-size:10px;color:var(--accent);font-weight:800;margin-bottom:5px;text-transform:uppercase;letter-spacing:2px;}
  .val{color:var(--accent2);}.result-val{color:var(--green);font-weight:800;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
  .result-cell{background:#0b0c0e;border:1px solid var(--border);padding:12px;text-align:center;}
  .r-label{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .r-value{font-family:var(--mono);font-size:22px;color:var(--green);}
  .r-unit{font-size:10px;color:var(--dim);font-family:var(--mono);}
  footer{position:relative;z-index:1;text-align:center;padding:16px;font-size:10px;color:var(--dim);letter-spacing:2px;border-top:1px solid var(--border);font-family:var(--mono);}
</style>
</head>
<body>
<header>
  <div class="logo-icon">3&#934;</div>
  <div class="logo-text">
    <div class="main">MOTORSCAN</div>
    <div class="sub">Induction Analyzer</div>
  </div>
</header>
<main>
  <div class="cam-card">
    <div class="section-label">01 &#8212; Capture Nameplate</div>
    <div id="video-container">
      <video id="video" autoplay playsinline></video>
      <div class="scan-overlay"></div>
      <div class="scan-window">
        <div class="scan-line"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <img id="preview-img" alt="Captured plate"/>
    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1" onclick="startCamera()">&#128247; Camera</button>
      <button class="btn btn-secondary" style="flex:1" onclick="document.getElementById('file-input').click()">&#128193; Upload</button>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)"/>
    </div>
    <div id="snap-row" class="btn-row" style="display:none;">
      <button class="btn btn-primary" style="flex:1" onclick="snapPhoto()">&#9889; Capture</button>
      <button class="btn btn-secondary" style="flex:1" onclick="stopCamera()">&#10005; Cancel</button>
    </div>
    <button class="btn btn-analyze" id="analyze-btn" onclick="runOCR()" disabled>&#10227; Analyze Label</button>
  </div>

  <div id="status-bar"><div class="spinner"></div><span id="status-text">Processing...</span></div>

  <div class="values-card" id="values-card">
    <div class="section-label">02 &#8212; Detected Values (edit if needed)</div>
    <div class="fields-grid">
      <div class="field-group"><label>Power P&#8322; (kW)</label><input type="number" id="f-p2" step="0.01" placeholder="e.g. 2.2"/></div>
      <div class="field-group"><label>Voltage (V)</label><input type="number" id="f-v" step="1" placeholder="e.g. 400"/></div>
      <div class="field-group"><label>Current (A)</label><input type="number" id="f-i" step="0.01" placeholder="e.g. 4.68"/></div>
      <div class="field-group"><label>Speed (RPM)</label><input type="number" id="f-rpm" step="1" placeholder="e.g. 1450"/></div>
      <div class="field-group"><label>cos &#966;</label><input type="number" id="f-cosphi" step="0.01" max="1" placeholder="e.g. 0.83"/></div>
      <div class="field-group"><label>Efficiency (%)</label><input type="number" id="f-eta" step="0.1" placeholder="e.g. 88.1"/></div>
    </div>
    <div class="field-group" style="margin-bottom:10px;">
      <label>Connection &#8212; dual-voltage labels (e.g. 230/400 V &#916;/Y)</label>
      <div class="radio-row">
        <label><input type="radio" name="conn" value="delta" checked onchange="reparse()"/> &#916; Delta &#8212; lower V</label>
        <label><input type="radio" name="conn" value="star" onchange="reparse()"/> Y Star &#8212; higher V</label>
      </div>
    </div>
    <div class="field-group" style="margin-bottom:14px;">
      <label>Grid Frequency</label>
      <div class="radio-row">
        <label><input type="radio" name="freq" value="50" checked/> 50 Hz</label>
        <label><input type="radio" name="freq" value="60"/> 60 Hz</label>
      </div>
    </div>
    <button class="btn btn-analyze" onclick="calculate()">&#9654; Calculate</button>
  </div>

  <div class="results-card" id="results-card">
    <div class="section-label">03 &#8212; Results</div>
    <div id="formula-container"></div>
    <div class="result-grid" id="result-grid"></div>
  </div>
</main>
<footer>MOTORSCAN &middot; 3-PHASE INDUCTION MOTOR &middot; IEC 60034</footer>

<script>
var stream = null;
var capturedDataUrl = null;
var lastOcrText = '';

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } } })
    .then(function(s) {
      stream = s;
      document.getElementById('video').srcObject = stream;
      document.getElementById('video-container').style.display = 'block';
      document.getElementById('snap-row').style.display = 'flex';
      document.getElementById('preview-img').style.display = 'none';
    })
    .catch(function() { setStatus('Camera access denied. Use Upload.', false, true, true); });
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('snap-row').style.display = 'none';
}

function snapPhoto() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.filter = 'grayscale(1) contrast(1.5) brightness(1.1)';
  ctx.drawImage(video, 0, 0);
  capturedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
  document.getElementById('preview-img').src = capturedDataUrl;
  document.getElementById('preview-img').style.display = 'block';
  stopCamera();
  document.getElementById('analyze-btn').disabled = false;
  setStatus('Image captured. Click Analyze Label.', false, true, false);
}

function handleFileUpload(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    capturedDataUrl = ev.target.result;
    document.getElementById('preview-img').src = capturedDataUrl;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('analyze-btn').disabled = false;
    setStatus('Image loaded. Click Analyze Label.', false, true, false);
  };
  reader.readAsDataURL(file);
}

function runOCR() {
  if (!capturedDataUrl) return;
  setStatus('Initializing OCR engine...', true, true, false);
  Tesseract.createWorker('eng', 1, {
    logger: function(m) {
      if (m.status === 'recognizing text')
        setStatus('Recognizing... ' + Math.round(m.progress * 100) + '%', true, true, false);
    }
  }).then(function(worker) {
    return worker.setParameters({
      tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.,/ +-:kKWVAHz()%'
    }).then(function() {
      return worker.recognize(capturedDataUrl);
    }).then(function(result) {
      worker.terminate();
      lastOcrText = result.data.text;
      parseAndFill(lastOcrText);
      setStatus('Extraction complete - review values below.', false, true, false);
    });
  }).catch(function(err) {
    console.error('OCR Error:', err);
    setStatus('OCR failed: ' + err.message, false, true, true);
  });
}

function reparse() {
  if (lastOcrText) parseAndFill(lastOcrText);
}

function parseAndFill(text) {
  var connEl = document.querySelector('input[name="conn"]:checked');
  var isDelta = !connEl || connEl.value === 'delta';
  var t = text.replace(/\n/g, ' ').replace(/\s+/g, ' ');
  function pick(a, b) { return isDelta ? a : b; }
  function pf(s) { return parseFloat(String(s).replace(',', '.')); }
  var m;

  var p2 = null;
  m = t.match(/[Pp]2\s*[-:]?\s*([0-9]+[.,][0-9]+)\s*k[Ww]/);
  if (m) p2 = pf(m[1]);
  if (!p2) { m = t.match(/([0-9]+[.,][0-9]+)\s*k[Ww]/i); if (m) p2 = pf(m[1]); }
  if (p2) setVal('f-p2', p2);

  var voltage = null;
  m = t.match(/([0-9]{2,3}(?:-[0-9]{2,3})?)\s*\/\s*([0-9]{3,4}(?:-[0-9]{2,3})?)\s*[Vv]/);
  if (m) { voltage = pick(pf(m[1].split('-')[0]), pf(m[2].split('-')[0])); }
  if (!voltage) { m = t.match(/([0-9]{3,4})\s*[Vv]/); if (m) voltage = pf(m[1]); }
  if (voltage) setVal('f-v', voltage);

  var current = null;
  m = t.match(/([0-9]+[.,][0-9]+)\s*\/\s*([0-9]+[.,][0-9]+)\s*[Aa]/);
  if (m) { current = pick(pf(m[1]), pf(m[2])); }
  if (!current) {
    m = t.match(/([0-9]+(?:[.,][0-9]+)?)-[0-9]+(?:[.,][0-9]+)?\s*\/\s*([0-9]+(?:[.,][0-9]+)?)-[0-9]+(?:[.,][0-9]+)?\s*[Aa]/);
    if (m) current = pick(pf(m[1]), pf(m[2]));
  }
  if (!current) { m = t.match(/([0-9]+[.,][0-9]+)\s*[Aa]/); if (m) current = pf(m[1]); }
  if (current) setVal('f-i', current);

  var rpm = null;
  m = t.match(/([0-9]{3,4})\s*(?:r\/min|rpm|\/min)/i);
  if (m) rpm = pf(m[1]);
  if (!rpm) { m = t.match(/([0-9]{3,4})\s*min/i); if (m) rpm = pf(m[1]); }
  if (rpm) setVal('f-rpm', rpm);

  var cp = null;
  m = t.match(/[cC][oO][sS][^0-9]{0,4}(0[.,][0-9]{2,3})/);
  if (m) cp = pf(m[1]);
  if (!cp) { m = t.match(/[pP][fF]\s*(0[.,][0-9]{2,3})/); if (m) cp = pf(m[1]); }
  if (!cp) { m = t.match(/\b0[.,]([789][0-9])\b/); if (m) cp = pf('0.' + m[1]); }
  if (cp) setVal('f-cosphi', cp);

  var eta = null;
  m = t.match(/IE[0-9]\s+([0-9]{2,3}[.,][0-9]+)/);
  if (m) eta = pf(m[1]);
  if (!eta) { m = t.match(/[hH]\s*([0-9]{2}[.,][0-9]+)/); if (m) eta = pf(m[1]); }
  if (!eta) { m = t.match(/([0-9]{2}[.,][0-9]+)\s*%/); if (m) eta = pf(m[1]); }
  if (eta) setVal('f-eta', eta);

  document.getElementById('values-card').style.display = 'block';
  document.getElementById('values-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setVal(id, v) {
  if (v === null || v === undefined || isNaN(v)) return;
  var el = document.getElementById(id);
  if (!el) return;
  el.value = v;
  el.style.borderColor = 'var(--green)';
  setTimeout(function(){ el.style.borderColor = ''; }, 2000);
}

function calculate() {
  var p2     = parseFloat(document.getElementById('f-p2').value);
  var v      = parseFloat(document.getElementById('f-v').value);
  var i      = parseFloat(document.getElementById('f-i').value);
  var rpm    = parseFloat(document.getElementById('f-rpm').value);
  var cosphi = parseFloat(document.getElementById('f-cosphi').value);
  var etaNp  = parseFloat(document.getElementById('f-eta').value);
  var freqEl = document.querySelector('input[name="freq"]:checked');
  var freq   = freqEl ? parseInt(freqEl.value) : 50;
  var container = document.getElementById('formula-container');
  var grid = document.getElementById('result-grid');
  container.innerHTML = ''; grid.innerHTML = '';
  var pelec = null, torque = null, slip = null, poles = null, ns = null, etaCalc = null;

  if (!isNaN(v) && !isNaN(i) && !isNaN(cosphi)) {
    pelec = Math.sqrt(3) * v * i * cosphi / 1000;
    addFormula(container, 'Electrical Input  P = &#8730;3 &times; U &times; I &times; cos&#966;',
      '&#8730;3 &times; <span class="val">' + v + ' V</span> &times; <span class="val">' + i + ' A</span> &times; <span class="val">' + cosphi + '</span> = <span class="result-val">' + pelec.toFixed(3) + ' kW</span>');
  }
  if (!isNaN(p2) && !isNaN(rpm)) {
    torque = (p2 * 9550) / rpm;
    addFormula(container, 'Shaft Torque  T = P&#8322; &times; 9550 / n',
      '<span class="val">' + p2 + ' kW</span> &times; 9550 / <span class="val">' + rpm + ' rpm</span> = <span class="result-val">' + torque.toFixed(2) + ' Nm</span>');
    var syncs = freq === 60 ? [3600, 1800, 1200, 900] : [3000, 1500, 1000, 750];
    ns = syncs.find(function(s){ return s > rpm; }) || syncs[0];
    poles = Math.round((120 * freq) / ns);
    slip = ((ns - rpm) / ns) * 100;
    addFormula(container, 'Slip &amp; Poles (' + freq + ' Hz)',
      'n-sync: <span class="val">' + ns + ' rpm</span> &nbsp;|&nbsp; Poles: <span class="val">' + poles + '</span> &nbsp;|&nbsp; Slip: <span class="result-val">' + slip.toFixed(2) + '%</span>');
  }
  if (pelec && !isNaN(p2)) {
    etaCalc = (p2 / pelec) * 100;
    var etaStr = '<span class="result-val">' + etaCalc.toFixed(1) + '%</span>';
    if (!isNaN(etaNp)) etaStr += ' &nbsp;<span style="color:var(--dim)">(nameplate: ' + etaNp + '%)</span>';
    addFormula(container, 'Efficiency  &#951; = P&#8322; / P-elec',
      '<span class="val">' + p2 + ' kW</span> / <span class="val">' + pelec.toFixed(3) + ' kW</span> = ' + etaStr);
  }
  var cells = [
    { l: 'P elec',     v: pelec   ? pelec.toFixed(2)   : '--', u: 'kW'  },
    { l: 'Torque',     v: torque  ? torque.toFixed(1)  : '--', u: 'Nm'  },
    { l: 'Slip',       v: slip    ? slip.toFixed(1)    : '--', u: '%'   },
    { l: 'Poles',      v: poles   || '--',                     u: 'P'   },
    { l: 'Efficiency', v: etaCalc ? etaCalc.toFixed(1) : (!isNaN(etaNp) ? etaNp.toFixed(1) : '--'), u: '%' },
    { l: 'n sync',     v: ns      || '--',                     u: 'rpm' }
  ];
  cells.forEach(function(r) {
    grid.innerHTML += '<div class="result-cell"><div class="r-label">' + r.l + '</div><div class="r-value">' + r.v + '</div><div class="r-unit">' + r.u + '</div></div>';
  });
  document.getElementById('results-card').style.display = 'block';
  document.getElementById('results-card').scrollIntoView({ behavior: 'smooth' });
}

function addFormula(parent, title, eq) {
  parent.innerHTML += '<div class="formula-block"><div class="formula-title">' + title + '</div><div>' + eq + '</div></div>';
}

function setStatus(msg, loading, show, error) {
  var bar = document.getElementById('status-bar');
  bar.classList.toggle('active', !!show);
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-text').style.color = error ? 'var(--red)' : 'var(--text)';
  bar.querySelector('.spinner').style.display = loading ? 'block' : 'none';
}
</script>
</body>
</html>
